name: RSS AI Daily Brief

on:
  schedule:
    # 每天 UTC 00:00 = 北京时间 08:00
    - cron: '0 0 * * *'
  workflow_dispatch: # 支持手动触发

# 防重叠：同一时间只允许一个采集任务跑，避免并发提交互相撞车产生冲突标记
concurrency:
  group: rss-daily-brief
  cancel-in-progress: false

permissions:
  contents: write # 需要写权限来 commit 日报回仓库

jobs:
  generate-brief:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          pip install -r tools/rss_daily_brief/requirements.txt

      - name: Generate daily brief
        run: |
          cd tools/rss_daily_brief
          python generate_brief.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # 先拉取远端最新，避免本机/其他动作并发 push 时撞车（non-fast-forward / 冲突标记）
          git pull --rebase origin "${GITHUB_REF_NAME}" || git pull --rebase
          git add output/rss_briefs/
          if git diff --cached --quiet; then
            echo "没有新内容，跳过提交"
          else
            git commit -m "AI 日报 $(date -u -d '+8 hours' '+%Y-%m-%d')"
            git push
          fi
